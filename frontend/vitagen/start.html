<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VitaGen – Bewerbungsassistent</title>
  <meta name="description" content="Erstelle professionelle Lebensläufe und Motivationsschreiben mit Live-Vorschau, KI-Unterstützung und wählbaren Stilen." />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-18Q6CWP558"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-18Q6CWP558');
  </script>
  <style>
    :root{
      --bg:#f5f6f8;
      --surface:#ffffff;
      --surface-soft:#f9fafb;
      --text:#1f2933;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#202833;
      --primary2:#384252;
      --accent:#b99768;
      --accent-soft:#f4efe7;
      --success:#12725a;
      --ai-purple:#6366f1;
      --ai-violet:#8b5cf6;
      --ai-blue:#2563eb;
      --ai-teal:#0f766e;
      --ai-cyan:#0ea5e9;
      --shadow:0 22px 60px rgba(17,24,39,.08);
      --soft-shadow:0 12px 36px rgba(17,24,39,.055);
      --radius-xl:28px;
      --radius-lg:20px;
      --radius-md:14px;
      --font:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--text);
      background:
        radial-gradient(circle at 8% 0%,rgba(185,151,104,.13),transparent 32%),
        radial-gradient(circle at 88% 9%,rgba(99,102,241,.07),transparent 28%),
        var(--bg);
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}
    button,a{font:inherit}

    .scroll-progress{display:none;}

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(245,246,248,.98);
      border-bottom:1px solid rgba(229,231,235,.82);
    }
    .topbar-inner{
      max-width:1500px;
      margin:0 auto;
      padding:15px 28px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:220px}
    .brand img{width:46px;height:46px;border-radius:50%;object-fit:contain;background:#fff;box-shadow:0 8px 22px rgba(17,24,39,.08)}
    .brand strong{display:block;font-size:16px;letter-spacing:-.02em}
    .brand span{display:block;font-size:12px;color:var(--muted)}
    .nav{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:999px;padding:5px}
    .nav a{padding:8px 11px;color:#475569;font-size:12px;font-weight:700;border-radius:999px;transition:.18s ease;white-space:nowrap}
    .nav a:hover{background:#fff;color:var(--primary);box-shadow:0 8px 18px rgba(17,24,39,.06)}
    .top-actions{display:flex;gap:10px;align-items:center}
    .lang-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px 4px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
    }
    .lang-icon {
      color: var(--muted);
      flex-shrink: 0;
    }
    .lang-options {
      display: flex;
      gap: 4px;
    }
    .lang-btn {
      border: 0;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--primary);
      color: #ffffff;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .lang-btn.muted {
      background: transparent;
      color: var(--muted);
    }
    .lang-btn:not(.muted):hover {
      background: var(--primary2);
    }

    .topbar-inner .btn {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      white-space: nowrap;
    }
    .topbar-inner .btn.primary {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 12px 28px rgba(31, 41, 51, 0.18);
    }
    .topbar-inner .btn.ghost {
      border-color: var(--line);
      background: #ffffff;
      color: var(--primary);
      box-shadow: none;
    }
    .topbar-inner .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(31, 41, 51, 0.14);
    }

    .btn{
      border:0;
      border-radius:999px;
      padding:12px 16px;
      transition:.18s ease;
      white-space:nowrap;
      font-weight:750;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:var(--primary);color:#fff;box-shadow:0 12px 28px rgba(17,24,39,.16)}
    .btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}
    .btn.gold{background:var(--accent-soft);color:#6e5128;border:1px solid #e9dcc5}
    .btn.ai{position:relative;overflow:hidden;color:#fff;background:linear-gradient(135deg,var(--ai-purple),var(--ai-violet),var(--ai-blue));box-shadow:0 14px 34px rgba(99,102,241,.24)}
    .btn.ai::after{display:none}

    .hero{
      max-width:1500px;
      margin:0 auto;
      padding:70px 28px 54px;
      display:grid;
      grid-template-columns:minmax(0,1.04fr) minmax(420px,.96fr);
      gap:34px;
      align-items:center;
      position:relative;
    }
    .hero::before{
      content:"";
      position:absolute;
      width:460px;
      height:460px;
      border-radius:50%;
      right:-190px;
      top:40px;
      background:radial-gradient(circle,rgba(99,102,241,.14),transparent 68%);
      pointer-events:none;
    }
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 11px;border-radius:999px;border:1px solid rgba(185,151,104,.22);background:rgba(255,255,255,.72);color:#7a5a2c;font-size:12px;font-weight:800;margin-bottom:18px}
    .eyebrow-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 5px rgba(185,151,104,.13)}
    .hero h1{margin:0;font-size:clamp(42px,5.4vw,82px);line-height:.92;letter-spacing:-.075em;max-width:920px}
    .hero h1 span{background:linear-gradient(135deg,#202833,#516070 54%,#b99768);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero p{margin:20px 0 0;max-width:760px;color:var(--muted);line-height:1.7;font-size:17px}
    .hero-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:28px}
    .hero-metrics{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}
    .metric-pill{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:999px;padding:9px 12px;color:#445063;font-size:12px;font-weight:700}

    .hero-visual{position:relative;min-height:560px;display:grid;place-items:center}
    .visual-stage{position:relative;width:min(100%,560px);height:540px;will-change: transform;}
    .floating-card{position:absolute;border-radius:26px;border:1px solid rgba(229,231,235,.9);background:rgba(255,255,255,.88);box-shadow:0 22px 70px rgba(17,24,39,.10);backdrop-filter:blur(14px);overflow:hidden;will-change: transform;}
    .doc-card{left:82px;top:20px;width:300px;height:420px;transform:translateY(-6px) rotate(-1deg)}
    .doc-card.second{left:220px;top:110px;width:280px;height:390px;opacity:.96;transform:translateY(0) rotate(1deg)}
    .doc-top{height:92px;padding:22px;background:linear-gradient(135deg,#202833,#384252);color:#fff}
    .doc-top strong{display:block;font-size:18px;letter-spacing:-.04em;margin-bottom:6px}
    .doc-top span{color:rgba(255,255,255,.72);font-size:11px}
    .doc-body{padding:22px;display:grid;gap:12px}
    .line{height:8px;border-radius:999px;background:#e5e7eb}
    .line.dark{background:#cbd5e1}.line.short{width:64%}.line.mid{width:82%}.line.gold{background:rgba(185,151,104,.38)}
    .mini-preview{right:12px;top:16px;width:175px;padding:14px;transform:translateY(-6px)}
    .mini-preview strong{display:block;font-size:13px;margin-bottom:10px}
    .mini-preview .mini-doc{aspect-ratio:210/297;border-radius:12px;border:1px solid var(--line);background:linear-gradient(90deg,#f6f8fa 0 30%,white 30% 100%);padding:12px;display:grid;grid-template-columns:30% 70%;gap:10px}
    .mini-side,.mini-main{display:grid;gap:7px;align-content:start}
    .mini-circle{width:28px;height:28px;border-radius:50%;background:#d9a98e;box-shadow:0 20px 0 7px #243044;margin-bottom:6px;transform:scale(.75);transform-origin:left top}
    .ai-badge-card{left:0;bottom:42px;width:240px;padding:16px;transform:translateY(-6px)}
    .ai-badge-card .badge-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .ai-icon{width:38px;height:38px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(135deg,var(--ai-purple),var(--ai-violet),var(--ai-blue));color:#fff;font-weight:900;box-shadow:0 12px 28px rgba(99,102,241,.22)}
    .ai-badge-card strong{font-size:13px}
    .progress-bars{display:grid;gap:9px}
    .progress{height:8px;border-radius:999px;background:#edf1f6;overflow:hidden}
    .progress span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--ai-purple),var(--ai-blue));width:85%}
    .progress:nth-child(2) span{background:linear-gradient(90deg,var(--ai-teal),var(--ai-cyan));width:65%}
    .progress:nth-child(3) span{background:linear-gradient(90deg,var(--accent),#d9c29e);width:90%}

    .section{max-width:1500px;margin:0 auto;padding:78px 28px}
    .section.compact{padding-top:48px}
    .section-head{display:flex;justify-content:space-between;gap:24px;align-items:end;margin-bottom:26px}
    .section-kicker{color:#76572c;font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
    .section h2{margin:0;font-size:clamp(30px,3.4vw,54px);line-height:1;letter-spacing:-.055em;max-width:830px}
    .section-head p{margin:0;max-width:500px;color:var(--muted);line-height:1.65;font-size:15px}

    .logo-strip{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:rgba(255,255,255,.55);overflow:hidden;display:flex}
    .marquee{display:flex;gap:14px;padding:18px 14px 18px 0;white-space:nowrap;animation:marquee 14s linear infinite;will-change: transform;flex-shrink:0}
    .marquee span{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--line);background:#fff;border-radius:999px;color:#64748b;font-size:13px;font-weight:700}
    @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-100%)}}

    .problem-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:20px}
    .problem-card{border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:30px;box-shadow:var(--soft-shadow);padding:28px;position:relative;overflow:hidden}
    .problem-card h3{margin:0;font-size:28px;letter-spacing:-.045em}
    .problem-card p{margin:12px 0 0;color:var(--muted);line-height:1.65}
    .problem-list{display:grid;gap:12px;margin-top:22px}
    .problem-item{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px;color:#475569;font-size:14px;line-height:1.45}
    .problem-item .mark{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:#fff4e8;color:#b7791f;font-weight:900;flex:0 0 auto}
    .solution-card{border:1px solid rgba(185,151,104,.22);background:linear-gradient(135deg,#fff,#fbf7ef);border-radius:30px;box-shadow:var(--soft-shadow);padding:28px;display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:center}
    .solution-preview{border:1px solid var(--line);background:#fff;border-radius:24px;padding:18px;min-height:300px;display:grid;gap:12px}
    .solution-preview .window-top{height:46px;border-radius:16px;background:#f8fafc;border:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:0 14px}
    .dot{width:9px;height:9px;border-radius:50%;background:#cbd5e1}.dot:nth-child(1){background:#f6b7b7}.dot:nth-child(2){background:#f6d98b}.dot:nth-child(3){background:#a7e2bc}
    .solution-preview .split{display:grid;grid-template-columns:44% 56%;gap:12px}
    .panel{border:1px solid var(--line);border-radius:18px;background:#fbfcfd;padding:14px;display:grid;gap:10px}
    .a4-small{aspect-ratio:210/297;border:1px solid var(--line);border-radius:14px;background:linear-gradient(90deg,#f6f8fa 0 32%,#fff 32% 100%);padding:14px;display:grid;gap:8px}

    .feature-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}
    .product-card{position:relative;overflow:hidden;border-radius:30px;border:1px solid var(--line);background:rgba(255,255,255,.9);box-shadow:var(--soft-shadow);padding:28px;min-height:460px;display:grid;grid-template-rows:auto auto 1fr auto;gap:22px;transition:.22s ease}
    .product-card:hover{transform:translateY(-4px);box-shadow:0 26px 70px rgba(17,24,39,.10)}
    .product-card::before{content:"";position:absolute;width:300px;height:300px;border-radius:50%;right:-120px;top:-130px;background:radial-gradient(circle,rgba(185,151,104,.18),transparent 66%);pointer-events:none}
    .product-card.ai::before{background:radial-gradient(circle,rgba(99,102,241,.18),transparent 66%)}
    .product-top{position:relative;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;z-index:1}
    .product-icon{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;background:#f7f1e7;color:#76572c;font-weight:900;border:1px solid #eadcc6;box-shadow:0 14px 30px rgba(185,151,104,.12)}
    .product-card.ai .product-icon{color:#fff;background:linear-gradient(135deg,var(--ai-purple),var(--ai-violet),var(--ai-blue));border:0;box-shadow:0 16px 32px rgba(99,102,241,.24)}
    .pill{border-radius:999px;padding:7px 10px;background:#eef2f6;color:#475569;font-size:12px;font-weight:800}
    .product-card h3{position:relative;margin:0;font-size:28px;line-height:1;letter-spacing:-.04em;z-index:1}
    .product-card p{position:relative;margin:12px 0 0;color:var(--muted);line-height:1.65;z-index:1}
    .product-list{display:grid;gap:12px;align-content:start;z-index:1;position:relative;padding:0;margin:0}
    .product-list li{list-style:none;display:flex;gap:10px;color:#475569;line-height:1.45;font-size:14px}
    .product-list li::before{content:"✓";width:22px;height:22px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;background:#e8f6ef;color:var(--success);font-weight:900;font-size:12px}
    .product-actions{display:flex;gap:10px;flex-wrap:wrap;position:relative;z-index:1}

    .deep-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
    .deep-card{border:1px solid var(--line);background:rgba(255,255,255,.9);box-shadow:var(--soft-shadow);border-radius:28px;padding:24px;min-height:260px;position:relative;overflow:hidden}
    .deep-card::before{content:"";position:absolute;width:160px;height:160px;border-radius:50%;right:-80px;top:-80px;background:radial-gradient(circle,rgba(185,151,104,.13),transparent 70%)}
    .deep-card.ai::before{background:radial-gradient(circle,rgba(99,102,241,.14),transparent 70%)}
    .deep-icon{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:var(--surface-soft);border:1px solid var(--line);font-weight:900;margin-bottom:16px}
    .deep-card.ai .deep-icon{background:linear-gradient(135deg,var(--ai-purple),var(--ai-violet),var(--ai-blue));color:#fff;border:0}
    .deep-card h3{margin:0;font-size:18px;letter-spacing:-.025em;position:relative;z-index:1}
    .deep-card p{margin:10px 0 0;color:var(--muted);line-height:1.62;font-size:14px;position:relative;z-index:1}

    .story{display:grid;grid-template-columns:420px 1fr;gap:22px;align-items:start}
    .story-sticky{position:sticky;top:92px;border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:30px;padding:26px;box-shadow:var(--soft-shadow)}
    .story-sticky h3{margin:0;font-size:30px;letter-spacing:-.045em;line-height:1}
    .story-sticky p{margin:14px 0 0;color:var(--muted);line-height:1.65}
    .story-flow{display:grid;gap:16px}
    .story-step{border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:28px;padding:24px;box-shadow:var(--soft-shadow);display:grid;grid-template-columns:70px 1fr;gap:18px;align-items:start}
    .story-number{width:58px;height:58px;border-radius:20px;display:grid;place-items:center;background:#f7f1e7;color:#76572c;font-weight:900;border:1px solid #eadcc6}
    .story-step h3{margin:0;font-size:20px;letter-spacing:-.025em}
    .story-step p{margin:8px 0 0;color:var(--muted);line-height:1.62}

    .template-wall{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
    .template-card{border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:24px;padding:14px;box-shadow:var(--soft-shadow);transition:.22s ease}
    .template-card:hover{transform:translateY(-4px)}
    .template-thumb{height:190px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(90deg,#f6f8fa 0 34%,#fff 34% 100%);padding:14px;display:grid;grid-template-columns:30% 70%;gap:12px;margin-bottom:12px}
    .template-thumb.letter{grid-template-columns:1fr;background:#fff}
    .template-card strong{display:block;font-size:13px}.template-card span{display:block;color:var(--muted);font-size:12px;margin-top:3px}

    .steps{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
    .step-card{border:1px solid var(--line);background:rgba(255,255,255,.88);box-shadow:var(--soft-shadow);border-radius:26px;padding:22px;min-height:230px;position:relative;overflow:hidden}
    .step-card::before{content:attr(data-step);position:absolute;right:18px;top:12px;font-size:64px;font-weight:900;color:rgba(15,23,42,.045);letter-spacing:-.08em}
    .step-card .step-icon{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:var(--surface-soft);border:1px solid var(--line);margin-bottom:16px;color:var(--primary);font-weight:900}
    .step-card h3{margin:0;font-size:18px;letter-spacing:-.02em}.step-card p{margin:10px 0 0;color:var(--muted);line-height:1.6;font-size:14px}

    .advantage-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
    .advantage-card{border:1px solid var(--line);background:rgba(255,255,255,.88);border-radius:26px;padding:22px;box-shadow:var(--soft-shadow);position:relative;overflow:hidden}
    .advantage-card::after{content:"";position:absolute;width:160px;height:160px;right:-80px;top:-80px;border-radius:50%;background:radial-gradient(circle,rgba(185,151,104,.12),transparent 70%)}
    .advantage-card h3{margin:0;font-size:18px;letter-spacing:-.02em;position:relative;z-index:1}.advantage-card p{margin:10px 0 0;color:var(--muted);line-height:1.6;font-size:14px;position:relative;z-index:1}

    .comparison{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .compare-card{border:1px solid var(--line);border-radius:30px;padding:26px;background:rgba(255,255,255,.9);box-shadow:var(--soft-shadow)}
    .compare-card.bad{background:linear-gradient(180deg,#fff,#fff8f4)}
    .compare-card.good{background:linear-gradient(180deg,#fff,#f5fbf8)}
    .compare-card h3{margin:0 0 18px;font-size:24px;letter-spacing:-.04em}
    .compare-list{display:grid;gap:12px}
    .compare-item{display:flex;gap:10px;color:#475569;line-height:1.45;font-size:14px}
    .compare-dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;font-weight:900}
    .bad .compare-dot{background:#fff0ea;color:#b45309}.good .compare-dot{background:#e8f6ef;color:var(--success)}

    .demo-strip{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:stretch}
    .demo-panel{border-radius:30px;border:1px solid var(--line);background:rgba(255,255,255,.9);box-shadow:var(--shadow);padding:24px;overflow:hidden;min-height:390px;position:relative}
    .demo-panel h3{margin:0;font-size:24px;letter-spacing:-.04em}.demo-panel p{margin:10px 0 22px;color:var(--muted);line-height:1.6}
    .demo-ui{display:grid;gap:12px}.fake-input{height:48px;border-radius:14px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;padding:0 14px;color:#475569;font-size:13px}
    .fake-preview{margin-top:12px;border-radius:22px;border:1px solid var(--line);background:linear-gradient(90deg,#f6f8fa 0 32%,#fff 32% 100%);height:180px;padding:18px;display:grid;grid-template-columns:30% 70%;gap:16px}
    .fake-preview .sidebar,.fake-preview .main{display:grid;align-content:start;gap:8px}

    .pricing-card{display:grid;grid-template-columns:1fr 1fr;gap:20px;border:1px solid var(--line);background:rgba(255,255,255,.9);box-shadow:var(--shadow);border-radius:34px;padding:28px}

      .steps,.advantage-grid,.deep-grid,.faq-grid{grid-template-columns:1fr}

      currentLang = lang;

      localStorage.setItem(LANGUAGE_STORAGE_KEY, lang);
      document.getElementById("langDe").classList.toggle("muted", lang !== "de");
      document.getElementById("langEn").classList.toggle("muted", lang !== "en");
      document.querySelectorAll("[data-i18n]").forEach(el => el.textContent = t(el.getAttribute("data-i18n")));
      document.querySelectorAll("[data-i18n-html]").forEach(el => el.innerHTML = t(el.getAttribute("data-i18n-html")));
